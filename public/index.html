<!DOCTYPE html>
<html lang="zh-Hant">

    <meta charset="utf-8" />

    <div id="root"></div>

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .catch(() => {});
        });
      }
    </script>
